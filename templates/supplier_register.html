<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seller Register | Electronics_Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
  --primary:#00e5ff;
  --secondary:#0ea5e9;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left,#00e5ff25,transparent 40%),
    radial-gradient(circle at bottom right,#0ea5e925,transparent 40%),
    linear-gradient(135deg,#0b0f1a,#020617);
  font-family:'Poppins',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

.register-box{
  position:relative;
  width:100%;
  max-width:480px;
  background:rgba(255,255,255,0.10);
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:45px 35px;
  box-shadow:0 50px 140px rgba(0,0,0,.8);
  animation:fadeUp .7s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

/* BACK */
.back-link{
  position:absolute;
  top:20px;
  left:22px;
  font-size:14px;
  color:#9fdfff;
  text-decoration:none;
}
.back-link:hover{color:#fff}

/* BRAND */
.brand{
  font-weight:700;
  color:var(--primary);
  letter-spacing:1px;
}
.subtitle{
  font-size:14px;
  color:#cbd5f5;
}

/* INPUT */
.form-control{
  background:rgba(255,255,255,.15);
  border:none;
  border-radius:16px;
  padding:13px 16px;
  color:#fff;
}
.form-control::placeholder{color:#cbd5f5}
.form-control:focus{
  background:rgba(255,255,255,.22);
  box-shadow:0 0 0 2px var(--primary);
  color:#fff;
}

/* BUTTON */
.btn-register{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  border:none;
  border-radius:16px;
  padding:13px;
  font-weight:600;
  transition:.3s;
}
.btn-register:hover{
  box-shadow:0 0 25px rgba(0,229,255,.8);
  transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="register-box">

 <!-- BACK -->
 <a href="{% url 'dashboard' %}" class="back-link">← Back</a>

 <h3 class="text-center mb-1">
  ⚡ <span class="brand">Electronics_Shop</span>
 </h3>

 <p class="text-center subtitle mb-4">
  Seller Registration
 </p>

 <!-- REGISTER FORM -->
 <form id="registerForm">
  {% csrf_token %}

  <input class="form-control mb-3" name="company" placeholder="Store Name" required>
  <input class="form-control mb-3" name="owner_name" placeholder="Owner Name" required>
  <input class="form-control mb-3" name="email" type="email" placeholder="Email Address" required>
  <input class="form-control mb-3" name="phone" placeholder="Phone Number" required>
  <input class="form-control mb-3" name="address" placeholder="Business Address" required>
  <input class="form-control mb-3" name="password" type="password" placeholder="Create Password" required>

  <button class="btn btn-register w-100 mt-2">
   Register as Seller
  </button>
 </form>

 <div class="text-center mt-4">
  <a href="{% url 'supplier_login' %}" class="text-info">
    Already registered? Login
  </a>
 </div>

</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e){
  e.preventDefault();

  let formData = new FormData(this);

  fetch("{% url 'supplier_register' %}", {
    method: "POST",
    headers: {
      "X-Requested-With": "XMLHttpRequest"
    },
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    if(data.status === "success"){
      Swal.fire({
        icon: "success",
        title: "Registration Successful",
        text: "Now you can login as a seller",
        timer: 1600,
        showConfirmButton: false
      }).then(() => {
        window.location.href = "{% url 'supplier_login' %}";
      });
    }
    else{
      Swal.fire({
        icon: "error",
        title: "Registration Failed",
        text: data.message
      });
    }
  });
});
</script>

</body>
</html>
