<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seller Login | Electronics_Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root{
  --primary:#00e5ff;
  --secondary:#0ea5e9;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left,#00e5ff25,transparent 40%),
    radial-gradient(circle at bottom right,#0ea5e925,transparent 40%),
    linear-gradient(135deg,#0b0f1a,#020617);
  font-family:'Poppins',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

/* LOGIN CARD */
.login-box{
  position:relative;
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,0.10);
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:45px 35px;
  box-shadow:0 50px 140px rgba(0,0,0,.8);
  animation:fadeUp .7s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

/* BACK */
.back-link{
  position:absolute;
  top:20px;
  left:22px;
  font-size:14px;
  color:#9fdfff;
  text-decoration:none;
}
.back-link:hover{color:#fff}

/* BRAND */
.brand{
  font-weight:700;
  color:var(--primary);
  letter-spacing:1px;
}
.subtitle{
  font-size:14px;
  color:#cbd5f5;
}

/* INPUT */
.form-control{
  background:rgba(255,255,255,.15);
  border:none;
  border-radius:16px;
  padding:13px 16px;
  color:#fff;
}
.form-control::placeholder{color:#cbd5f5}
.form-control:focus{
  background:rgba(255,255,255,.22);
  box-shadow:0 0 0 2px var(--primary);
  color:#fff;
}

/* BUTTON */
.btn-login{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  border:none;
  border-radius:16px;
  padding:13px;
  font-weight:600;
  transition:.3s;
}
.btn-login:hover{
  box-shadow:0 0 25px rgba(0,229,255,.8);
  transform:translateY(-2px);
}
</style>
</head>

<body>

<div class="login-box">

 <!-- BACK -->
 <a href="{% url 'supplier_register' %}" class="back-link">← Back</a>

 <h3 class="text-center mb-1">
  ⚡ <span class="brand">Viral Electronics</span>
 </h3>

 <p class="text-center subtitle mb-4">
  Seller Secure Login
 </p>

 <!-- LOGIN FORM -->
 <form id="loginForm">
  {% csrf_token %}

  <input class="form-control mb-3"
         name="owner_name"
         placeholder="Owner Name"
         required>

  <input class="form-control mb-3"
         type="password"
         name="password"
         placeholder="Password"
         required>

  <button type="submit" class="btn btn-login w-100 mt-2">
   Login to Seller Dashboard
  </button>
 </form>

 <div class="d-flex justify-content-between mt-4">
  <a href="{% url 'supplier_forgot_password' %}" class="text-info">
    Forgot Password?
  </a>
  <a href="{% url 'supplier_register' %}" class="btn btn-outline-info btn-sm">
    Register
  </a>
 </div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  let formData = new FormData(this);

  fetch("{% url 'supplier_login' %}", {
    method: "POST",
    headers: {
      "X-Requested-With": "XMLHttpRequest"
    },
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    if(data.status === "success"){
      Swal.fire({
        icon: "success",
        title: "Login Successful",
        text: "Welcome to Viral Electronics Seller Dashboard",
        timer: 1500,
        showConfirmButton: false
      }).then(() => {
        window.location.href = "{% url 'supplier_dashboard' %}";
      });
    } else if(data.status === "not_registered"){
      Swal.fire({
        icon: "warning",
        title: "Not Registered",
        text: "Please register as a seller first"
      });
    } else {
      Swal.fire({
        icon: "error",
        title: "Login Failed",
        text: data.message
      });
    }
  });
});
</script>

</body>
</html>
