<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login | Electronics_Shop</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
  background:#0f1116;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#fff;
}

/* CARD */
.card{
  background:#1b1d29;
  padding:40px;
  border-radius:16px;
  width:380px;
  max-width:92%;
  box-shadow:0 25px 60px rgba(0,0,0,.6);
}

/* TITLE */
h2{text-align:center;margin-bottom:25px;font-weight:600;}

/* FORM */
form{display:flex;flex-direction:column;gap:18px;}

/* INPUT */
.input-group{position:relative;}
input{
  width:100%;
  padding:14px 44px 14px 14px;
  border-radius:12px;
  border:none;
  outline:none;
  background:#2a2c3a;
  color:#fff;
  font-size:15px;
}
input:focus{background:#383a4c;}
label{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:#aaa;
  pointer-events:none;
  transition:.3s;
  font-size:14px;
}
input:focus + label,
input:not(:placeholder-shown) + label{
  top:-8px;
  font-size:12px;
  color:#10a37f;
  background:#1b1d29;
  padding:0 6px;
}

/* EYE ICON */
.eye{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:18px;
  color:#aaa;
}
.eye:hover{color:#10a37f;}

/* PASSWORD STRENGTH */
#strength{
  height:6px;
  border-radius:6px;
  background:#444;
  margin-top:-10px;
}
.fill-weak{background:#ff6b6b;}
.fill-medium{background:#fca311;}
.fill-strong{background:#4ade80;}

/* CAPTCHA */
.captcha-box{
  display:flex;
  align-items:center;
  gap:10px;
}
.captcha{
  background:#fff;
  color:#000;
  padding:10px 14px;
  border-radius:8px;
  font-weight:bold;
  letter-spacing:3px;
}
.refresh{cursor:pointer;color:#10a37f;font-weight:bold;}

/* BUTTON */
button{
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:600;
  font-size:16px;
  background:linear-gradient(90deg,#10a37f,#0e8b6c);
  cursor:pointer;
}
button:hover{opacity:.9;}

/* LINKS */
.toggle,.forgot{
  text-align:center;
  font-size:14px;
  color:#10a37f;
  cursor:pointer;
}
.toggle:hover,.forgot:hover{text-decoration:underline;}

/* TOAST */
.toast{
  position:fixed;
  bottom:30px;
  right:30px;
  background:#1b1d29;
  border-left:5px solid #10a37f;
  padding:18px 22px;
  border-radius:14px;
  display:flex;
  align-items:center;
  gap:14px;
  box-shadow:0 20px 40px rgba(0,0,0,.6);
  transform:translateX(120%);
  transition:.5s ease;
  z-index:999;
}
.toast.show{transform:translateX(0);}

.tick{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#10a37f;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:bold;
  animation:pop .4s ease;
}
@keyframes pop{
  0%{transform:scale(0);}
  80%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

.toast-text{font-size:15px;}
.spinner{
  width:22px;
  height:22px;
  border:3px solid #333;
  border-top:3px solid #10a37f;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* MOBILE */
@media(max-width:480px){
  .toast{
    right:50%;
    transform:translate(50%,120%);
  }
  .toast.show{
    transform:translate(50%,0);
  }
}
</style>
</head>

<body>

<div class="card">
<h2 id="title">Sign In</h2>

 <a href="{% url 'dashboard' %}" class="back-link">← Back</a><br>
    <br>
<form id="form">

  <div class="input-group" id="emailBox" style="display:none">
    <input id="email" type="email" placeholder=" ">
    <label>Email</label>
  </div>

  <div class="input-group">
    <input id="username" placeholder=" " required>
    <label>Username</label>
  </div>

  <div class="input-group">
    <input id="password" type="password" placeholder=" " required>
    <label>Password</label>
    <span class="eye" onclick="togglePassword()">👁️</span>
  </div>

  <div id="strength"></div>

  <div class="captcha-box">
    <div class="captcha" id="captchaText"></div>
    <span class="refresh" onclick="generateCaptcha()">⟳</span>
  </div>

  <div class="input-group">
    <input id="captchaInput" placeholder=" " required>
    <label>Enter CAPTCHA</label>
  </div>

  <button>Continue</button>
</form>

<div class="toggle" onclick="toggleMode()">Create account</div>
<div class="forgot" onclick="forgotPassword()">Forgot password?</div>
</div>

<!-- TOAST -->
<div id="toast" class="toast">
  <div class="tick">✔</div>
  <div class="toast-text">Login successful!</div>
  <div class="spinner"></div>
</div>

<script>
let mode="login";

/* PASSWORD TOGGLE */
function togglePassword(){
  password.type = password.type==="password"?"text":"password";
}

/* CAPTCHA */
function generateCaptcha(){
  const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  captchaText.innerText=[...Array(6)]
    .map(()=>c[Math.floor(Math.random()*c.length)]).join("");
}
generateCaptcha();

/* TOGGLE MODE */
function toggleMode(){
  mode = mode==="login"?"signup":"login";
  title.innerText = mode==="login"?"Sign In":"Create Account";
  emailBox.style.display = mode==="signup"?"block":"none";
  document.querySelector(".toggle").innerText =
    mode==="login"?"Create account":"Already have an account?";
  generateCaptcha();
}

/* TOAST */
function showToast(){
  toast.classList.add("show");
}

/* SUBMIT */
form.onsubmit = async (e)=>{
  e.preventDefault();

  if(captchaInput.value.toUpperCase() !== captchaText.innerText){
    alert("CAPTCHA does not match");
    generateCaptcha();
    return;
  }

  const payload = {
    username: username.value,
    password: password.value,
    email: email.value
  };

  const url = mode==="signup"
    ? "/auth/register/"
    : "/auth/login/";

  const res = await fetch(url,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "X-CSRFToken":"{{ csrf_token }}"
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if(data.error){
    alert(data.error);
    return;
  }

  if(mode==="signup"){
    alert("Account created. Please login.");
    toggleMode();
  }else{
    showToast();
    setTimeout(()=>window.location.href="/dashboard/",1200);
  }
};
</script>


</body>
</html>
