<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Checkout |  Electronics_Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
 font-family:'Poppins',sans-serif;
 background:
 linear-gradient(rgba(0,0,0,.9),rgba(0,0,0,.95)),
 url('https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=1600&q=80')
 center/cover fixed;
 color:#fff;
}

/* CARD */
.checkout-card{
 background:rgba(255,255,255,0.12);
 backdrop-filter:blur(18px);
 border-radius:28px;
 padding:40px;
 box-shadow:0 30px 80px rgba(0,0,0,.7);
 animation:fadeUp .7s ease;
}

@keyframes fadeUp{
 from{opacity:0;transform:translateY(40px)}
 to{opacity:1;transform:translateY(0)}
}

/* INPUT */
.form-control{
 background:rgba(0,0,0,.4);
 border:1px solid rgba(255,255,255,.2);
 color:#fff;
 border-radius:14px;
}
.form-control::placeholder{color:#aaa}
.form-control:focus{
 background:rgba(0,0,0,.6);
 border-color:#00e5ff;
 box-shadow:0 0 12px rgba(0,229,255,.6);
 color:#fff;
}

/* PAYMENT BOX */
.payment-option{
 border:2px solid rgba(255,255,255,.2);
 border-radius:18px;
 padding:15px;
 cursor:pointer;
 transition:.3s;
}
.payment-option:hover{
 border-color:#00e5ff;
 background:rgba(0,229,255,.08);
}

/* BUTTON */
.btn-pay{
 background:linear-gradient(45deg,#00e5ff,#0072ff);
 border:none;
 color:#fff;
 padding:14px;
 border-radius:16px;
 font-size:18px;
 font-weight:600;
}
.btn-pay:hover{
 box-shadow:0 0 25px rgba(0,229,255,.8);
}
</style>
</head>

<body>

<div class="container py-5">
 <div class="row justify-content-center">
  <div class="col-lg-6">

   <div class="checkout-card">

    <h2 class="fw-bold text-center mb-4">
     <i class="bi bi-shield-lock"></i> Secure Electronics Checkout
    </h2>

    <form method="POST">
     {% csrf_token %}

     <!-- USER INFO -->
     <div class="mb-3">
      <label class="mb-1">Full Name</label>
      <input class="form-control" name="name" placeholder="Enter full name" required>
     </div>

     <div class="mb-3">
      <label class="mb-1">Phone Number</label>
      <input class="form-control" name="phone" placeholder="10 digit mobile number" required>
     </div>

     <div class="mb-4">
      <label class="mb-1">Delivery Address</label>
      <textarea class="form-control" name="address" rows="3"
       placeholder="Complete delivery address with PIN code" required></textarea>
     </div>

     <!-- PAYMENT METHOD -->
     <h5 class="fw-semibold mb-3">Select Payment Method</h5>

     <div class="payment-option mb-3">
      <input type="radio" name="payment_method" value="COD" checked>
      <strong class="ms-2">
        <i class="bi bi-cash"></i> Cash on Delivery
      </strong>
      <div class="small text-muted ms-4">
        Pay when your electronics are delivered
      </div>
     </div>

     <div class="payment-option mb-4">
      <input type="radio" name="payment_method" value="RAZORPAY">
      <strong class="ms-2">
        <i class="bi bi-credit-card"></i> Online Payment (Razorpay)
      </strong>
      <div class="small text-muted ms-4">
        UPI • Debit/Credit Card • Net Banking
      </div>
     </div>

     <!-- TOTAL -->
     <div class="d-flex justify-content-between align-items-center mb-4">
      <h5>Total Amount</h5>
      <h4 class="fw-bold text-info">₹ {{ total }}</h4>
     </div>

     <button class="btn btn-pay w-100">
      <i class="bi bi-lightning-charge"></i> Place Order Securely
     </button>

    </form>

   </div>

  </div>
 </div>
</div>

</body>
</html>
