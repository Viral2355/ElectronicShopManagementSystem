<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Product | Electronics_Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
 --primary:#00e5ff;
 --glass:rgba(255,255,255,0.12);
}
*{font-family:'Poppins',sans-serif}
body{
 background:
 linear-gradient(rgba(0,0,0,.9),rgba(0,0,0,.95)),
 url("https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1600&q=80") center/cover fixed;
 color:#fff;
 min-height:100vh;
}
.navbar{
 background:rgba(0,0,0,.85);
 backdrop-filter:blur(12px);
}
.navbar-brand{
 font-weight:700;
 color:var(--primary)!important;
}
.card-glass{
 background:var(--glass);
 backdrop-filter:blur(18px);
 border-radius:26px;
 padding:42px;
 box-shadow:0 30px 80px rgba(0,0,0,.7);
 animation:fadeUp .7s ease;
}
@keyframes fadeUp{
 from{opacity:0;transform:translateY(25px)}
 to{opacity:1;transform:translateY(0)}
}
.form-label{font-weight:600}
.form-control,.form-select{
 background:rgba(0,0,0,.45);
 border:none;
 color:#fff;
 border-radius:14px;
 padding:14px;
}
.form-control:focus,.form-select:focus{
 outline:none;
 box-shadow:0 0 0 2px var(--primary);
 background:rgba(0,0,0,.6);
}
.upload-box{
 border:2px dashed var(--primary);
 border-radius:18px;
 padding:26px;
 text-align:center;
 cursor:pointer;
 transition:.3s;
}
.upload-box:hover{background:rgba(0,229,255,.08)}
.preview-img{
 width:100%;
 max-height:220px;
 object-fit:contain;
 margin-top:14px;
 display:none;
}
.btn-main{
 background:linear-gradient(135deg,var(--primary),#0072ff);
 border:none;
 color:#00343d;
 font-weight:700;
 padding:15px;
 border-radius:16px;
}
.btn-main:hover{opacity:.9}

/* TOAST */
.toast-box{
 position:fixed;
 bottom:30px;
 right:30px;
 background:#101820;
 padding:22px 26px;
 border-left:6px solid #00ff9c;
 border-radius:18px;
 display:flex;
 gap:14px;
 align-items:center;
 box-shadow:0 20px 50px rgba(0,0,0,.7);
 transform:translateX(120%);
 transition:.5s;
 z-index:999;
}
.toast-box.show{transform:translateX(0)}
.toast-icon{
 width:44px;height:44px;
 border-radius:50%;
 background:#00ff9c;
 color:#000;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:22px;
}
</style>
</head>

<body>

<nav class="navbar fixed-top">
 <div class="container">
  <a class="navbar-brand" href="{% url 'dashboard' %}">
   <i class="bi bi-cpu"></i> Electronics_Shop
  </a>
 </div>
</nav>

<div class="container" style="padding-top:140px;padding-bottom:80px">
 <div class="row justify-content-center">
  <div class="col-lg-7">

   <div class="card-glass">
    <h2 class="text-center mb-4">
     <i class="bi bi-phone"></i> Add New Electronic Product
    </h2>

    <form id="productForm" method="POST" enctype="multipart/form-data">
     {% csrf_token %}

     <div class="mb-3">
      <label class="form-label">Product Name</label>
      <input name="name" class="form-control" placeholder="e.g. Samsung Galaxy S24 / HP Laptop" required>
     </div>

     <div class="mb-3">
      <label class="form-label">Category</label>
      <select name="category" class="form-select" required>
       <option value="">Select category</option>
       {% for c in categories %}
       <option value="{{ c.id }}">{{ c.name }}</option>
       {% endfor %}
      </select>
     </div>

     <div class="row">
      <div class="col-md-6 mb-3">
       <label class="form-label">Price (₹)</label>
       <input type="number" step="0.01" name="price" class="form-control" required>
      </div>
      <div class="col-md-6 mb-3">
       <label class="form-label">Stock Quantity</label>
       <input type="number" name="stock" class="form-control" required>
      </div>
     </div>

     <label class="form-label">Product Image</label>
     <div class="upload-box" onclick="fileInput.click()">
      <i class="bi bi-cloud-arrow-up fs-1"></i>
      <p class="mt-2">Click to upload product image</p>
      <input type="file" name="image" id="fileInput" hidden accept="image/*">
      <img id="preview" class="preview-img">
     </div>

     <button class="btn btn-main w-100 mt-4">
      <i class="bi bi-check-circle"></i> Submit for Approval
     </button>
    </form>

   </div>
  </div>
 </div>
</div>

<!-- SUCCESS TOAST -->
<div id="toast" class="toast-box">
 <div class="toast-icon">✔</div>
 <div>
  <strong>Product Submitted</strong><br>
  Waiting for admin approval
 </div>
</div>

<script>
const fileInput=document.getElementById("fileInput");
const preview=document.getElementById("preview");
fileInput.onchange=e=>{
 const f=e.target.files[0];
 if(f){
  preview.src=URL.createObjectURL(f);
  preview.style.display="block";
 }
};

const form=document.getElementById("productForm");
const toast=document.getElementById("toast");

form.onsubmit=e=>{
 e.preventDefault();
 const fd=new FormData(form);
 fetch("",{
  method:"POST",
  body:fd,
  headers:{"X-CSRFToken":fd.get("csrfmiddlewaretoken")}
 })
 .then(r=>r.json())
 .then(d=>{
  if(d.success){
   toast.classList.add("show");
   form.reset();
   preview.style.display="none";
   setTimeout(()=>toast.classList.remove("show"),3000);
  }
 });
};
</script>

</body>
</html>
