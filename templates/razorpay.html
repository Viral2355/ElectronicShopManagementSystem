<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Payment | Electronics_Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #0b0f1a, #141e30, #243b55);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .payment-card {
            width: 420px;
            padding: 35px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: #00e5ff;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.85;
            margin-bottom: 25px;
        }

        .amount-box {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .amount-label {
            font-size: 13px;
            opacity: 0.8;
        }

        .amount {
            font-size: 34px;
            font-weight: 700;
            margin-top: 6px;
            color: #00e5ff;
        }

        .pay-btn {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #00e5ff, #0072ff);
            color: #001f25;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 229, 255, 0.4);
        }

        .secure-text {
            margin-top: 18px;
            font-size: 12px;
            opacity: 0.75;
        }

        .secure-text span {
            color: #00e5ff;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="payment-card">
    <div class="logo">⚡ Electronics_Shop</div>
    <div class="subtitle">Secure Razorpay Checkout</div>

    <div class="amount-box">
        <div class="amount-label">Total Payable Amount</div>
        <div class="amount">₹ {{ total }}</div>
    </div>

    <button id="pay-btn" class="pay-btn">
        Pay Securely
    </button>

    <div class="secure-text">
        🔒 Powered by <span>Razorpay</span> • 100% Secure Payment
    </div>
</div>

<form id="razorpay-form" method="POST" action="{% url 'razorpay_success' %}">
    {% csrf_token %}
    <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
</form>

<script>
    const options = {
        key: "{{ razorpay_key }}",
        amount: "{{ amount }}",
        currency: "INR",
        name: "Viral Electronics",
        description: "Electronics Order Payment",
        order_id: "{{ order_id }}",
        theme: { color: "#00e5ff" },
        handler: function (response) {
            document.getElementById("razorpay_payment_id").value =
                response.razorpay_payment_id;
            document.getElementById("razorpay-form").submit();
        }
    };

    const rzp = new Razorpay(options);

    document.getElementById("pay-btn").onclick = function (e) {
        rzp.open();
        e.preventDefault();
    };
</script>

</body>
</html>
