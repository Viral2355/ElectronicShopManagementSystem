<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password | Electronics_Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#00e5ff;
  --accent:#0ea5e9;
}

body{
  min-height:100vh;
  background:radial-gradient(circle at top,#0b0f1a,#020617 70%);
  font-family:'Poppins',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(16px);
  border-radius:26px;
  box-shadow:0 35px 100px rgba(0,0,0,.8);
  color:#fff;
  animation:fadeUp .7s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

/* INPUT */
.form-control{
  background:rgba(255,255,255,.12);
  border:none;
  color:#fff;
  border-radius:14px;
  padding:12px;
}

.form-control::placeholder{
  color:#cbd5f5;
}

.form-control:focus{
  background:rgba(255,255,255,.20);
  color:#fff;
  box-shadow:0 0 0 2px var(--primary);
}

/* BUTTON */
.btn-main{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  border:none;
  font-weight:600;
  border-radius:14px;
  padding:12px;
  color:#000;
  transition:.3s;
}

.btn-main:hover{
  box-shadow:0 0 25px rgba(0,229,255,.8);
  transform:translateY(-2px);
}

/* LINK */
.small-link{
  color:#9ca3af;
  text-decoration:none;
  font-size:14px;
}

.small-link:hover{
  color:#00e5ff;
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="col-md-4 col-sm-10">
 <div class="card p-4">

  <h3 class="text-center mb-2">
    ⚡ Seller Password Reset
  </h3>

  <p class="text-center text-light mb-4" style="font-size:14px;">
   Enter your owner name and set a new secure password
  </p>

  {% for msg in messages %}
   <div class="alert alert-warning text-dark">{{ msg }}</div>
  {% endfor %}

  <form method="POST">
   {% csrf_token %}

   <input class="form-control mb-3"
          name="owner_name"
          placeholder="Owner Name"
          required>

   <input class="form-control mb-3"
          type="password"
          name="new_password"
          placeholder="New Password"
          required>

   <button class="btn btn-main w-100 mt-2">
    🔐 Reset Password
   </button>
  </form>

  <div class="text-center mt-3">
   <a href="{% url 'supplier_login' %}" class="small-link">
    ← Back to Seller Login
   </a>
  </div>

 </div>
</div>

</body>
</html>
